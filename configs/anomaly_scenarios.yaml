# Anomaly injection scenario definitions for synthetic Rx rebate data.
#
# Each top-level key is a scenario type that maps to an AnomalyScenarioConfig.
# The `count` field controls how many independent instances of each scenario are
# injected into the synthetic dataset.
#
# Additional parameters are scenario-specific and are documented inline.
# See docs/02-data/synthetic-data-generation.md for full scenario descriptions.
# See src/synthetic_data_gen/schema.py:AnomalyTypeEnum for valid anomaly_type values.

# ---------------------------------------------------------------------------
# Scenario A: Missing rebate for eligible claims
# ---------------------------------------------------------------------------
# For `count` contracted brand × client × quarter combinations, set actual_rebate
# to zero even though expected_rebate is positive. Tests the basic
# expected-vs-actual reconciliation layer.
missing_rebate:
  count: 5
  # Fraction of actual rebate to remove (1.0 = full zeroing, 0.5 = half removed)
  reduction_factor: 1.0
  # Whether the leakage should be marked as recoverable in ground-truth labels
  recoverable: true

# ---------------------------------------------------------------------------
# Scenario B: Unmapped NDC (new product not linked to contract)
# ---------------------------------------------------------------------------
# Create `count` NDCs under existing brand families but omit them from
# rebate invoice generation entirely. The missing invoice rebate becomes the
# recoverable leakage estimate. Tests NDC mapping controls.
unmapped_ndc:
  count: 3
  # Fraction of invoiced rebate value assigned to the new NDC (used to
  # estimate impact relative to other NDCs in the brand family)
  relative_volume_fraction: 0.05
  recoverable: true

# ---------------------------------------------------------------------------
# Scenario C: Rebate yield collapse
# ---------------------------------------------------------------------------
# For `count` high-volume brand × client × quarter combinations, reduce actual
# rebate by `reduction_factor` without changing utilization, formulary status,
# or contract terms. Tests time-series trend anomaly detection.
rebate_yield_collapse:
  count: 3
  # Fraction of expected rebate retained (0.30 = 70% reduction)
  reduction_factor: 0.30
  recoverable: true

# ---------------------------------------------------------------------------
# Scenario D: Specialty channel omission
# ---------------------------------------------------------------------------
# For `count` NDC × client combinations, apply rebates normally for retail
# channel claims but zero out actual rebates for specialty channel claims.
# Tests channel-dimension anomaly detection.
specialty_channel_omission:
  count: 4
  # Channel whose rebates are zeroed
  omitted_channel: "specialty"
  reduction_factor: 1.0
  recoverable: true

# ---------------------------------------------------------------------------
# Scenario E: Unit conversion error
# ---------------------------------------------------------------------------
# For `count` injectable drug × client × quarter combinations, divide the
# invoiced utilization quantity by 10, causing actual rebate to be ~10% of
# expected. Tests ratio-based anomaly detection.
unit_conversion_error:
  count: 2
  # Divisor applied to invoiced units (simulates mL vs. vial confusion)
  unit_divisor: 10
  recoverable: true

# ---------------------------------------------------------------------------
# Scenario F: Manufacturer dispute spike
# ---------------------------------------------------------------------------
# Keep invoiced rebates correct but increase disputed_rebate significantly,
# causing paid_rebate to drop below expected. Tests invoice-to-payment
# reconciliation anomaly detection.
dispute_spike:
  count: 3
  # Fraction of actual_rebate that becomes disputed (0.80 = 80% disputed)
  dispute_fraction: 0.80
  recoverable: true

# ---------------------------------------------------------------------------
# Scenario G: PMPM guarantee true-up missing
# ---------------------------------------------------------------------------
# Generate aggregate rebates below the PMPM minimum guarantee threshold but
# omit the true-up payment that should close the gap. Tests contract-level
# guarantee enforcement.
guarantee_true_up_missing:
  count: 2
  # Fraction of the PMPM guarantee threshold that actual rebates reach
  # (0.70 = actual is 70% of guarantee; the 30% gap is the missing true-up)
  actual_as_fraction_of_guarantee: 0.70
  recoverable: true
